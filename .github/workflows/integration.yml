name: Module 5 - Integration Test

on:
    workflow_run:
        workflows: [ "Module 3 & 4 - Build and Security" ]
        types: [ completed ]

jobs:
    integration-test:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            # 1. Setup environment variables from Compose instruction
            - name: Create .env file
              run: |
                  echo "REDIS_HOST=${{ vars.REDIS_HOST }}" >> .env
                  echo "API_URL=${{ vars.API_URL }}" >> .env
                  echo "FRONTEND_PORT=${{ vars.FRONTEND_PORT }}" >> .env
                  echo "MEM_LIMIT=${{ vars.MEM_LIMIT }}" >> .env
                  echo "CPU_LIMIT=${{ vars.CPU_LIMIT }}" >> .env

            # 2. Bring the full stack up
            - name: Bring Stack Up
              run: docker compose up -d --build

            - name: Wait for Healthchecks
              run: |
                  echo "Waiting for services to report healthy..."
                  sleep 15

            # 3. Run the integration test script
            - name: Run Test Script
              run: |
                  chmod +x tests/integration.sh
                  ./tests/integration.sh

            # 4. Mandatory Cleanup (Runs regardless of outcome)
            - name: Tear Down Stack
              if: always()
              run: docker compose down -v
