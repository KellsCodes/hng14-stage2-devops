name: Module 3 - Build and Registry

on:
    workflow_run:
        workflows: [ "Module 2 - Unit Tests" ]
        types: [ completed ]

jobs:
    build-and-push:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest

        # Start a local registry as a service
        services:
            registry:
                image: registry:2
                ports:
                    - 5000:5000

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
              with:
                  driver-opts: network=host

            # We build and push all 3 services: API, Worker, Frontend
            - name: Build and Push Images
              run: |
                  SERVICES=("api" "worker" "frontend")
                  REGISTRY="localhost:5000"
                  SHA=${{ github.sha }}

                  for SERVICE in "${SERVICES[@]}"; do
                    echo "Processing $SERVICE..."
                    
                    # Build and push to local registry with both tags
                    docker build -t $REGISTRY/$SERVICE:$SHA \
                                 -t $REGISTRY/$SERVICE:latest \
                                 ./$SERVICE
                    
                    docker push $REGISTRY/$SERVICE:$SHA
                    docker push $REGISTRY/$SERVICE:latest
                  done

            - name: List local images
              run: curl http://localhost:5000/v2/_catalog
